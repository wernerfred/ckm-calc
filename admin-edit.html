<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12343b" />
    <title>CKM Admin Editor</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="admin-app">
      <header class="admin-top">
        <h1 id="adminTitle">Administration</h1>
        <div class="top-actions">
          <button type="button" class="back logout" id="logoutBtn">Logout</button>
          <a href="./admin.html" class="back">Zurück</a>
        </div>
      </header>

      <section id="itemList" class="item-list" aria-label="Artikel bearbeiten"></section>

      <form id="addForm" class="add-form">
        <h2>Neuer Artikel</h2>
        <label>
          <span>Name</span>
          <input id="newName" type="text" maxlength="60" required />
        </label>
        <label>
          <span>Preis (€)</span>
          <input id="newPrice" type="number" min="0" step="0.1" inputmode="decimal" required />
        </label>
        <label class="toggle">
          <input id="newAutoDeposit" type="checkbox" />
          <span>Auto Pfand (2€) bei +</span>
        </label>
        <button type="submit">Artikel hinzufügen</button>
      </form>
    </main>

    <script src="catalogs.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
