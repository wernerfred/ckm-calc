<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12343b" />
    <title>CKM Calc - Cocktail</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-calc-id="cocktail">
    <main class="app" aria-live="polite">
      <header class="brand">
        <h1 class="brand-main">CKM Calc <span class="brand-sub">- Cocktail</span></h1>
      </header>

      <header class="top">
        <section class="total-card">
          <p class="label">Gesamtsumme</p>
          <p id="total" class="total">0,00 €</p>
        </section>
        <section class="change-card">
          <p class="label">Rückgeld-Hilfe</p>
          <div id="changeHints" class="hints"></div>
        </section>
      </header>

      <section id="rows" class="rows" aria-label="Artikel"></section>

      <footer class="bottom">
        <button id="reset" type="button" class="reset-btn">Nächster Kunde / Zurücksetzen</button>
      </footer>
    </main>

    <script src="catalogs.js"></script>
    <script src="app.js"></script>
  </body>
</html>
